<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Pruebas TIT - Dark Edition</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            /* Fondo base negro */
            --card-bg-color: #121212;
            /* Tarjetas en gris ultra oscuro */
            --header-bg-color: #1a1a1a;
            /* Encabezado */
            --text-color: #ffffff;
            /* Texto principal blanco */
            --text-secondary: #aaaaaa;
            /* Texto secundario gris */
            --border-color: #333333;
            /* Líneas divisorias sutiles */
            --shadow: 0 4px 10px rgba(255, 255, 255, 0.05);
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: var(--header-bg-color);
            color: #fff;
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg-color);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .card h2 {
            margin-bottom: 20px;
            color: var(--text-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            color: #fff;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ffffff;
        }

        /* --- BOTONES EN BLANCO Y NEGRO ENTORNO OSCURO --- */
        button {
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        /* Botón Agregar / Actualizar (Invierte a Blanco para resaltar) */
        #addUpdateBtn {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }

        #addUpdateBtn:hover {
            background-color: #dddddd;
            border-color: #dddddd;
        }

        /* Botón de Editar en la Tabla */
        .btn-edit {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 1px solid var(--border-color);
            margin-right: 5px;
            padding: 8px 12px;
        }

        .btn-edit:hover {
            background-color: #333333;
            border-color: #ffffff;
        }

        /* Botón de Eliminar en la Tabla */
        .btn-delete {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            padding: 8px 12px;
        }

        .btn-delete:hover {
            background-color: #dddddd;
        }

        /* Botón Reporte PDF */
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background-color: #dddddd;
        }

        /* --- TABLA --- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 10px;
            text-align: left;
        }

        th {
            background-color: #1a1a1a;
            color: var(--text-secondary);
        }

        /* --- METRICAS GRID --- */
        .metricas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .metrica {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .metrica-valor {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .metrica-label {
            font-size: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-section {
            width: 100%;
        }

        #graficoDispersion {
            width: 100%;
            height: 500px;
        }

        footer {
            margin-top: 20px;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-line"></i> Analizador de Pruebas TIT</h1>
        </header>

        <main>
            <div class="crud-section card">
                <h2><i class="fas fa-users-cog"></i> Gestión de Aprendices (CRUD)</h2>
                <div class="input-group">
                    <input type="text" id="nombreAprendiz" placeholder="Nombre del aprendiz...">
                    <button id="addUpdateBtn">
                        <i class="fas fa-user-plus"></i>
                        <span id="btnText">Agregar</span>
                    </button>
                </div>
                <table id="tablaAprendices">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Total Pruebas</th>
                            <th>Resultados</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaAprendices"></tbody>
                </table>
            </div>

            <div class="analysis-section card">
                <h2><i class="fas fa-brain"></i> Análisis de Comportamiento</h2>
                <div id="metricasGenerales"></div>
            </div>

            <div class="chart-section card">
                <h2><i class="fas fa-chart-scatter"></i> Gráfico de Evolución</h2>
                <div id="graficoDispersion"></div>
            </div>
        </main>

        <footer>
            <button id="btnExportarPDF" class="btn-primary">
                <i class="fas fa-file-pdf"></i> Exportar Reporte PDF
            </button>
        </footer>
    </div>

    <script>
        let aprendices = [];
        let currentIndex = null;

        const nombreInput = document.getElementById("nombreAprendiz");
        const addUpdateBtn = document.getElementById("addUpdateBtn");
        const btnText = document.getElementById("btnText");
        const listaAprendices = document.getElementById("listaAprendices");
        const metricasGenerales = document.getElementById("metricasGenerales");
        const graficoDispersion = document.getElementById("graficoDispersion");
        const btnExportarPDF = document.getElementById("btnExportarPDF");

        document.addEventListener("DOMContentLoaded", () => {
            addUpdateBtn.addEventListener("click", agregarOActualizarAprendiz);
            btnExportarPDF.addEventListener("click", exportarPDF);
            nombreInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") agregarOActualizarAprendiz();
            });

            cargarDatosEjemplo();
            actualizarInterfaz();
        });

        function agregarOActualizarAprendiz() {
            const nombre = nombreInput.value.trim();
            if (!nombre) {
                alert("Por favor ingresa un nombre");
                return;
            }

            if (currentIndex !== null) {
                aprendices[currentIndex].nombre = nombre;
                currentIndex = null;
                btnText.textContent = "Agregar";
            } else {
                aprendices.push({
                    id: Date.now(),
                    nombre: nombre,
                    pruebas: generarPruebasAleatorias()
                });
            }

            nombreInput.value = "";
            actualizarInterfaz();
        }

        function editarAprendiz(index) {
            currentIndex = index;
            nombreInput.value = aprendices[index].nombre;
            btnText.textContent = "Actualizar";
            nombreInput.focus();
        }

        function eliminarAprendiz(index) {
            if (confirm(`¿Seguro que deseas eliminar a ${aprendices[index].nombre}?`)) {
                aprendices.splice(index, 1);

                if (currentIndex === index) {
                    currentIndex = null;
                    btnText.textContent = "Agregar";
                    nombreInput.value = "";
                }
                actualizarInterfaz();
            }
        }

        function actualizarInterfaz() {
            renderizarTabla();
            actualizarMetricasGenerales();
            actualizarGrafico();
        }

        function generarPruebasAleatorias() {
            return Array.from({ length: 4 }, () => Math.floor(Math.random() * 40) + 60);
        }

        function calcularPromedio(pruebas) {
            if (pruebas.length === 0) return 0;
            return (pruebas.reduce((a, b) => a + b, 0) / pruebas.length).toFixed(1);
        }

        function calcularDesempeno(promedio) {
            if (promedio >= 90) return { texto: "Excelente", color: "#2ecc71" };
            if (promedio >= 80) return { texto: "Bueno", color: "#3498db" };
            if (promedio >= 70) return { texto: "Aceptable", color: "#f1c40f" };
            return { texto: "Necesita mejorar", color: "#e74c3c" };
        }

        function renderizarTabla() {
            listaAprendices.innerHTML = "";
            aprendices.forEach((aprendiz, index) => {
                const promedio = calcularPromedio(aprendiz.pruebas);
                const desempeno = calcularDesempeno(parseFloat(promedio));

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${aprendiz.nombre}</strong></td>
                    <td>${aprendiz.pruebas.length}</td>
                    <td><strong style="color:${desempeno.color}">${promedio}</strong> <small style="color:var(--text-secondary)">(${desempeno.texto})</small></td>
                    <td>
                        <button onclick="editarAprendiz(${index})" class="btn-edit" title="Editar"><i class="fas fa-edit"></i></button>
                        <button onclick="eliminarAprendiz(${index})" class="btn-delete" title="Eliminar"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                listaAprendices.appendChild(row);
            });
        }

        function actualizarMetricasGenerales() {
            if (aprendices.length === 0) {
                metricasGenerales.innerHTML = "<p style='text-align:center; color:#666;'>No hay aprendices registrados actualmente.</p>";
                return;
            }

            const totalAprendices = aprendices.length;
            let todasLasNotas = aprendices.flatMap(a => a.pruebas);
            const promedioGeneral = calcularPromedio(todasLasNotas);

            metricasGenerales.innerHTML = `
                <div class="metricas-grid">
                    <div class="metrica">
                        <div class="metrica-valor">${totalAprendices}</div>
                        <div class="metrica-label">Total Aprendices</div>
                    </div>
                    <div class="metrica">
                        <div class="metrica-valor">${todasLasNotas.length}</div>
                        <div class="metrica-label">Pruebas Realizadas</div>
                    </div>
                    <div class="metrica">
                        <div class="metrica-valor">${promedioGeneral}</div>
                        <div class="metrica-label">Promedio Global</div>
                    </div>
                </div>
            `;
        }

        // --- Gráfico Plotly integrado en Modo Oscuro con colores pálidos ---
        function actualizarGrafico() {
            if (aprendices.length === 0) {
                Plotly.purge(graficoDispersion);
                return;
            }

            const miIconoPersonalizado = "path://M12 3L1 9l11 6 9-4.91V17h2V9L12 3z M5.5 13.06v3.27c0 1.94 2.91 3.5 6.5 3.5s6.5-1.56 6.5-3.5v-3.27L12 16.5l-6.5-3.44z";
            const coloresPastel = ['#B3CDE3', '#FBB4AE', '#CCEBC5', '#DEC9E9', '#FED9A6', '#E5D8BD'];

            const traces = aprendices.map((aprendiz, index) => {
                const colorAsignado = coloresPastel[index % coloresPastel.length];

                return {
                    x: Array.from({ length: aprendiz.pruebas.length }, (_, i) => i + 1),
                    y: aprendiz.pruebas,
                    mode: 'lines+markers',
                    name: aprendiz.nombre,
                    marker: {
                        symbol: miIconoPersonalizado,
                        size: 24,
                        color: colorAsignado,
                        line: { width: 1, color: '#121212' } // Borde oscuro adaptado al fondo
                    },
                    line: {
                        width: 3,
                        shape: 'spline',
                        color: colorAsignado
                    }
                };
            });

            const layout = {
                title: { text: 'Dispersión de Resultados por Aprendiz', font: { color: '#ffffff' } },
                xaxis: { title: { text: 'Número de Prueba (Secuencia)', font: { color: '#aaaaaa' } }, tickformat: 'd', gridcolor: '#333333', tickfont: { color: '#888888' } },
                yaxis: { title: { text: 'Puntuación TIT', font: { color: '#aaaaaa' } }, range: [0, 105], gridcolor: '#333333', tickfont: { color: '#888888' } },
                hovermode: 'closest',
                margin: { t: 50, b: 50, l: 50, r: 20 },
                // ADAPTACIÓN DE COLORES DE FONDO PLOTLY
                plot_bgcolor: '#121212',
                paper_bgcolor: '#121212',
                legend: { font: { color: '#ffffff' } }
            };

            const config = { responsive: true, displayModeBar: false };
            Plotly.newPlot(graficoDispersion, traces, layout, config);
        }

        function exportarPDF() {
            if (aprendices.length === 0) {
                alert("No hay datos para exportar");
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Reporte de Pruebas TIT", 20, 20);

            doc.setFontSize(12);
            let y = 40;
            aprendices.forEach((a, i) => {
                doc.text(`${i + 1}. ${a.nombre} - Promedio: ${calcularPromedio(a.pruebas)} - Pruebas: ${a.pruebas.join(', ')}`, 20, y);
                y += 10;
            });
            doc.save("Reporte_TIT.pdf");
        }

        function cargarDatosEjemplo() {
            aprendices = [
                { id: 1, nombre: "María López", pruebas: [85, 92, 88, 95] },
                { id: 2, nombre: "Carlos Ramírez", pruebas: [78, 82, 75, 80] },
                { id: 3, nombre: "Ana Martínez", pruebas: [95, 98, 90, 94] }
            ];
        }
    </script>
</body>

</html>
